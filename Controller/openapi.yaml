openapi: 3.1.0
info:
  title: FireFly Controller
  description: Configure and manage controllers and client configurations
  version: "9999.99.99"
servers:
  - url: http://{domain}
    variables:
      domain:
        default: 192.168.10.101
        description: IP address of the device's ethernet interface
tags:
  - name: Authorization
    description: Manage long-term http authorizations
  - name: Event and Error Logs
    description: Operations for the event and error logs
  - name: Version
    description: Operations for the hardware and firmware versions
  - name: Certificates
    description: Operations for the storage, retrieval, and management of certificates
  - name: Controllers
    description: Manage controllers
  - name: Clients
    description: Manage clients
  - name: General
    description: Helper operations
  - name: Cloud Backup
    description: Operations for managing encrypted configuration backups in the cloud

##########################################################
## NOTE: This may not render except in the next-gen     ##
## Swagger UI renderer https://editor-next.swagger.io/  ##
##########################################################

paths:


##########################################################
## Version                                              ##
##########################################################
  
  /api/version:
    get:
      tags:
        - Version
      summary: Hardware and firmware version information
      description: Retrieves the hardware and firmware version information
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/applicationVersionInfo'

  /api/reboot:
    post:
      tags:
        - Device
      summary: Reboot the device
      description: Logs a reboot event and restarts the device after a short delay
      security:
        - visualToken: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized

##########################################################
## Events and Errors                                    ##
##########################################################
  
  /api/errors:
    get:
      tags:
        - Event and Error Logs
      summary: Error log information
      description: Retrieve all of the active errors
      security:
        - visualToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorLog'
              examples:
                Events in the log:
                  $ref: '#/components/examples/errorLog'
                No log entries:
                  $ref: '#/components/examples/emptyArray'
        '401':
          description: Unauthorized

  /api/events:
    get:
      tags:
        - Event and Error Logs
      summary: Event log information
      description: Retrieve all of the events still remaining in the event log
      security:
        - visualToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eventLog'
              examples:
                Events in the log:
                  $ref: '#/components/examples/eventLog'
                No log entries:
                  $ref: '#/components/examples/emptyArray'
        '401':
          description: Unauthorized


##########################################################
## OTA Firmware                                         ##
##########################################################
  
  /api/ota:
    post:
      tags:
        - Clients
        - Controllers
      summary: Trigger OTA firmware update
      description: |
        Triggers an OTA update from a firmware version object. The `binaries` array specifies
        which partitions to flash and their URLs; any combination of `app` and `ui` is accepted.
        Partitions are flashed sequentially (ui first, then app). The device reboots automatically
        after the app partition is written. Returns `409 Conflict` if an update is already in
        progress or pending.
      security:
        - visualToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/firmwareVersion'
            example:
              binaries:
                - partition: app
                  url: https://firmware.fireflylx.com/controller/0x32322505/2026.03.01/Controller.ino.bin
                  sha256: a3f1c2d4e5b6a7f8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
                - partition: ui
                  url: https://firmware.fireflylx.com/controller/0x32322505/2026.03.01/ui.bin
                  sha256: b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5
      responses:
        '202':
          description: Accepted — OTA update pending
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              examples:
                missing_binaries:
                  value:
                    message: Field binaries is required
                no_valid_binaries:
                  value:
                    message: No valid binaries found
        '401':
          description: Unauthorized
        '409':
          description: Conflict — an OTA update is already in progress or pending


##########################################################
## Certificates                                         ##
##########################################################

  /certs:
    get:
      tags:
        - Certificates
      summary: Get certificate list
      description: Retrives the list of certificates in flash storage
      security:
        - visualToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/certificateList'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    post:
      tags:
        - Certificates
      summary: Create a new certificate
      description: Creates a new certificate with the content in the payload
      security:
        - visualToken: []
      parameters:
        - in: header
          name: X-Cert-Type
          required: true
          schema:
            type: string
            enum: [controller, client, both]
          description: Intended use for the certificate. "controller" trusts the cert for HTTPS OTA validation; "client" designates it as the client CA distributed to clients via provisioning; "both" sets both flags.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              example:
                message: "X-Cert-Type header required; valid values: controller, client, both"
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              example:
                message: Certificate already exists
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              example:
                message: A client certificate is already designated
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted

  /certs/{filename}:
    get:
      tags:
        - Certificates
      summary: Get a certificate
      description: Retrieves the content of a certificate
      security:
        - visualToken: []
      parameters:
        - in: path
          name: filename
          schema:
            type: string
            examples: 
              - mycert.pem
            maxLength: 31
          required: true
          description: Certificate filename to retrieve
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/certificateContent'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    delete:
      tags:
        - Certificates
      summary: Delete a certificate
      description: Deletes the requested certificate from flash storage
      security:
        - visualToken: []
      parameters:
        - in: path
          name: filename
          schema:
            type: string
            examples: 
              - mycert.pem
            maxLength: 31
          required: true
          description: Certificate filename to delete
      responses:
        '204':
          description: Deleted certificate successfully
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
  /auth:
    post:
      tags:
        - Authorization
      summary: Authorize the visual token
      description: Creates a long-term authorization for a visual token (typically 60 minutes)
      security:
        - visualToken: []
      responses:
        '204':
          description: Authorized
        '401':
          description: Unauthorized


##########################################################
## Provisioning                                         ##
##########################################################

  /api/provisioning:
    get:
      tags:
        - Controllers
      summary: Retrieve the status of provisioning mode on this controller
      description: Retrieve the status of provisioning mode on this controller
      security:
        - visualToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: Indicates if provisioning mode is enabled on the device
                  ssid:
                    type: string
                    description: SoftAP SSID; present only when enabled is true
                    example: FireFly-Provisioning
                  password:
                    type: string
                    description: WPA2 SoftAP password derived from device BSSID; present only when enabled is true
                    example: A6B5C4D3E2F1
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
    put:
      tags:
        - Controllers
      summary: Enable provisioning mode on this controller
      description: Enable provisioning mode on this controller
      security:
        - visualToken: []
      responses:
        '202':
          description: Request accepted
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              example:
                message: Not supported by hardware
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
    delete:
      tags:
        - Controllers
      summary: Disable provisioning mode on this controller
      description: Disable provisioning mode on this controller
      security:
        - visualToken: []
      responses:
        '202':
          description: Request accepted
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              example:
                message: Not supported by hardware
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'


  /api/provisioning/token:
    post:
      tags:
        - Controllers
      summary: Exchange credentials for a per-device provisioning token
      description: >
        Authenticates an unprovisioned controller by UUID and MAC address, and returns a short-lived
        bearer token for use in subsequent provisioning requests. The token is bound to the requesting
        device's MAC address and has a sliding expiry window (5 minutes in production, 30 minutes in
        debug builds). A second POST for the same MAC invalidates the previous token. Only accessible
        via the provisioning SoftAP — Ethernet requests are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - uuid
                - mac_address
              properties:
                uuid:
                  $ref: '#/components/schemas/uuid'
                mac_address:
                  $ref: '#/components/schemas/macAddress'
                  description: MAC address of the requesting controller. Must match the mac field stored in the controller record.
      responses:
        '200':
          description: OK — token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: integer
                    format: int64
                    description: Per-device provisioning token. Pass as the provisioning-token header in subsequent GET requests.
                    example: 3819273645
        '400':
          description: Bad Request — uuid must be 36 characters, or mac_address is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
        '401':
          description: Unauthorized — MAC address does not match the stored controller record
        '403':
          description: Forbidden — request did not arrive via the provisioning SoftAP network
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Only accessible via provisioning network
        '404':
          description: Not Found — no controller record found for the provided UUID, or the record has no mac field
        '405':
          description: Method Not Allowed
        '409':
          description: Conflict — provisioning mode is not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Provisioning mode inactive
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'


  /api/provisioning/certs:
    get:
      tags:
        - Provisioning
      summary: Retrieve the client CA certificate for mutual TLS
      description: Returns the designated client CA certificate (PEM text and SHA-256 fingerprint) to a registered client device connecting via the provisioning SoftAP. No nonce is required; the certificate is not sensitive. Returns 404 if no client CA certificate has been designated.
      security:
        - macAddress: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  fingerprint:
                    type: string
                    description: SHA-256 fingerprint of the certificate formatted as colon-separated uppercase hex
                    examples:
                      - "AA:BB:CC:DD:EE:FF:00:11:22:33:44:55:66:77:88:99:AA:BB:CC:DD:EE:FF:00:11:22:33:44:55:66:77:88:99"
                  pem:
                    type: string
                    description: PEM-encoded certificate text
        '400':
          description: Bad Request — mac-address header missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              example:
                message: mac-address header required
        '401':
          description: Unauthorized — MAC address not registered as a client
        '403':
          description: Forbidden — request did not arrive via the provisioning SoftAP network
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Only accessible via provisioning network
        '404':
          description: Not Found — no client CA certificate has been designated
        '405':
          description: Method Not Allowed
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Provisioning mode inactive
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Unable to compute fingerprint


##########################################################
## Controllers                                          ##
##########################################################

  /api/controllers:
    get:
      tags:
        - Controllers
      summary: Retrieve the list of defined controller UUIDs
      description: Retrieve the list of defined controller UUIDs
      security:
        - visualToken: []
        - provisioningToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/uuid'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted

  /api/controllers/{uuid}:
    get:
      tags:
        - Controllers
      summary: Retrieve a controller
      description: Retrieve a controller
      security:
        - visualToken: []
        - provisioningToken: []
      parameters:
        - in: path
          name: uuid
          schema:
            $ref: '#/components/schemas/uuid'
          required: true
          description: Controller UUID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    put:
      tags:
        - Controllers
      summary: Create or update a controller
      description: Create or update a controller.  Note that contents are not validated and are immediately stored to the file system.
      security:
        - visualToken: []
      parameters:
        - in: path
          name: uuid
          schema:
            $ref: '#/components/schemas/uuid'
          required: true
          description: Controller UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/controller'
      responses:
        '204':
          description: Success
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    delete:
      tags:
        - Controllers
      summary: Delete a controller
      description: Delete a controller
      security:
        - visualToken: []
      parameters:
        - in: path
          name: uuid
          schema:
            $ref: '#/components/schemas/uuid'
          required: true
          description: Controller UUID
      responses:
        '204':
          description: File Deleted Successfully
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted


  ##########################################################
  ## Clients                                              ##
  ##########################################################
  /api/clients:
    get:
      tags:
        - Clients
      summary: Retrieve the list of defined client UUIDs
      description: Retrieve the list of defined client UUIDs
      security:
        - visualToken: []
        - provisioningToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/uuid'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted

  /api/clients/{uuid}:
    get:
      tags:
        - Clients
      summary: Retrieve a client
      description: Retrieve a client
      security:
        - visualToken: []
        - provisioningToken: []
      parameters:
        - in: path
          name: uuid
          schema:
            $ref: '#/components/schemas/uuid'
          required: true
          description: Client UUID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/client'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — provisioning-token request did not arrive via the provisioning SoftAP network
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Only accessible via provisioning network
        '404':
          description: Not Found
        '409':
          description: Conflict — provisioning-token used but provisioning mode is not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Provisioning mode inactive
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    put:
      tags:
        - Clients
      summary: Create or update a client
      description: Create or update a client.  Note that contents are not validated and are immediately stored to the file system.
      security:
        - visualToken: []
      parameters:
        - in: path
          name: uuid
          schema:
            $ref: '#/components/schemas/uuid'
          required: true
          description: Client UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/client'
      responses:
        '204':
          description: Success
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    delete:
      tags:
        - Clients
      summary: Delete a client
      description: Delete a client
      security:
        - visualToken: []
      parameters:
        - in: path
          name: uuid
          schema:
            $ref: '#/components/schemas/uuid'
          required: true
          description: Client UUID
      responses:
        '204':
          description: File Deleted Successfully
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted


  ##########################################################
  ## General                                              ##
  ##########################################################
  
  /backup:
    head:
      tags:
        - General
      summary: Retrieve the ETag of the stored backup
      description: >
        Returns headers only. The `ETag` header contains the SHA-256 hex digest of the
        plaintext backup content, computed at `PUT` time. Use this to determine whether
        the controller's stored backup matches a locally-known hash without downloading
        the full file. If the backup exists but was written by firmware that predates
        this feature, the `ETag` header will be absent.
      security:
        - visualToken: []
      responses:
        '200':
          description: OK
          headers:
            ETag:
              description: SHA-256 hex digest of the plaintext backup, quoted per RFC 7232. Absent if no sidecar exists.
              schema:
                type: string
              example: '"a3f1c2d4e5b6..."'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    get:
      tags:
        - General
      summary: Retrieve the backup of the database
      description: Retrieves the backup of the database in Dexie format.
      security:
        - visualToken: []
        - provisioningToken: []
      responses:
        '200':
          description: OK
          headers:
            ETag:
              description: SHA-256 hex digest of the plaintext backup, quoted per RFC 7232. Absent if no sidecar exists.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dexieFormat'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — provisioning-token request did not arrive via the provisioning SoftAP network
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Only accessible via provisioning network
        '404':
          description: Not Found
        '409':
          description: Conflict — provisioning-token used but provisioning mode is not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: Provisioning mode inactive
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    put:
      tags:
        - General
      summary: Create or replace a backup of the database
      description: Create or replace a backup of the database in Dexie format. Note that contents are not validated and are immediately stored to the file system.
      security:
        - visualToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dexieFormat'
      responses:
        '204':
          description: Success
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
    delete:
      tags:
        - General
      summary: Deletes the stored backup
      description: Deletes the stored backup
      security:
        - visualToken: []
      responses:
        '204':
          description: File Deleted Successfully
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: File system not mounted
  

  /api/cloud-backup:
    post:
      tags:
        - Cloud Backup
      summary: Push local backup to cloud
      description: |
        Reads the backup from the config file system, encrypts it on-device with
        `key_backup` (AES-256-GCM, HKDF-derived from the eFuse master key with the
        label `firefly-backup-v1`), and uploads the ciphertext blob to the FireFly
        Cloud. Returns the HTTP status code returned by the cloud.
      security:
        - visualToken: []
      responses:
        '200':
          description: Cloud accepted the upload (cloud returned 200, 204, or 304)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code returned by the cloud
        '401':
          description: Unauthorized
        '404':
          description: No local backup found
        '409':
          description: Device not provisioned
        '413':
          description: Backup exceeds 512 KB limit
        '500':
          description: Encryption or internal failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
        '502':
          description: Cloud returned an unexpected status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: integer
        '503':
          description: Clock not synchronized
    get:
      tags:
        - Cloud Backup
      summary: Restore backup from cloud
      description: |
        Downloads the encrypted backup blob from the FireFly Cloud, decrypts it
        on-device with `key_backup`, writes the result to the config file system,
        and returns the plaintext JSON to the caller.
      security:
        - visualToken: []
      responses:
        '200':
          description: Backup restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dexieFormat'
        '401':
          description: Unauthorized
        '404':
          description: No backup found in cloud
        '409':
          description: Device not provisioned
        '500':
          description: Decryption or internal failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
        '502':
          description: Cloud returned an unexpected response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: integer
        '503':
          description: Clock not synchronized
    delete:
      tags:
        - Cloud Backup
      summary: Delete cloud backup
      description: |
        Sends a DELETE request to the FireFly Cloud to remove the stored backup for
        this device. If a local backup also exists, it is removed as well.
      security:
        - visualToken: []
      responses:
        '204':
          description: Backup deleted
        '401':
          description: Unauthorized
        '404':
          description: No backup found in cloud
        '409':
          description: Device not provisioned
        '502':
          description: Cloud returned an unexpected status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: integer
        '503':
          description: Clock not synchronized


  /files:
    get:
      tags:
        - General
      summary: Retrieve a list of files across all file systems
      description: Retrieve a list of files by file system
      security:
        - visualToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/fileList'
        '401':
          description: Unauthorized

  
##########################################################
##########################################################
## Components                                           ##
##########################################################
##########################################################

components:

##########################################################
## Security                                             ##
##########################################################

  securitySchemes:
    visualToken:
      type: apiKey
      in: header
      name: visual-token
      description: A security token visually displayed on the device which changes on a regular basis

    macAddress:
      type: apiKey
      in: header
      name: mac-address
      description: A client MAC address that matches the resource being requested, valid only while in provisioning mode

    provisioningToken:
      type: apiKey
      in: header
      name: provisioning-token
      description: A per-device token issued by POST /api/provisioning/token, valid while provisioning mode is active. Must be used via the provisioning SoftAP; tokens are refused on the Ethernet interface.

 
  schemas:

    ##########################################################
    ## Standard API Responses                               ##
    ##########################################################

    error_message:
      type: object
      properties:
        error:
          type: string
          description: Message describing the error condition
          examples: 
            - Unexpected Error

    bad_request_message:
      type: object
      properties:
        message:
          type: string
          description: Message describing the issue with the request body
          examples: 
            - Missing parameter in request


    ##########################################################
    ## Errors and Event Log                                 ##
    ##########################################################

    eventLog:
      type: array
      items:
        $ref: '#/components/schemas/eventLogEntry'

    eventLogEntry:
      type: object
      properties:
        time:
          type: integer
          description: Time the event occurred, in seconds.  If NTP time was available when the event was logged, Epoch time will be used.  Otherwise, time since boot will be used
          examples: 
            - 1709398094
        level:
          type: string
          description: Severity level for the event
          enum:
            - info
            - notify
            - error
            - unknown
          examples: 
            - info
        text:
          type: string
          description: Descriptive text about the event
          examples: 
            - Event log started

    errorLog:
      type: array
      items:
        $ref: '#/components/schemas/errorLogEntry'

    errorLogEntry:
      type: object
      properties:
        text:
          type: string
          description: Descriptive text about the event
          examples: 
            - NVS failure


    ##########################################################
    ## Versions                                             ##
    ##########################################################

    applicationVersion:
      type: object
      description: Application name, version, and commit hash
      properties:
        name:
          type: string
          description: Application name
          examples:
            - 'Controller'
        version:
          type: string
          description: Software version
          examples:
            - '2026.05.12'
        commit:
          type: string
          description: Git commit hash
          examples:
            - '1234c67'

    productHex:
      type: string
      description: Hardware product hexadecimal, indicating the version of the firmware
      examples: 
        - '0x8062305'

    applicationVersionInfo:
      type: object
      properties:
        uuid:
          $ref: '#/components/schemas/uuid'
        product_id:
          $ref: '#/components/schemas/productId'
        product_hex:
          $ref: '#/components/schemas/productHex'
        application:
          $ref: '#/components/schemas/applicationVersion'
        ui:
          oneOf:
            - $ref: '#/components/schemas/applicationVersion'
            - type: 'null'
          description: User interface version installed on the ui partition; null if the partition is not mounted or the version.json file is absent

    productId:
      type: string
      description: Device product ID, which includes the board revision code
      examples: 
        - FFC3232-2211
      maxLength: 32

    ##########################################################
    ## Certificates                                         ##
    ##########################################################

    certificateListItem:
      type: object
      properties:
        file:
          type: string
          description: Certificate's filename
          examples:
             - mycert.pem
        size:
          type: integer
          description: Certificate's size in bytes
          examples:
            - 1410
        controller:
          type: boolean
          description: True if this certificate is trusted for HTTPS OTA validation (replaces the Mozilla bundle for controller connections)
        client:
          type: boolean
          description: True if this certificate is the designated client CA distributed to clients during provisioning
    
    certificateList:
      type: array
      items:
        $ref: '#/components/schemas/certificateListItem'
    
    certificateContent:
      type: string
      examples: 
        - '-----BEGIN CERTIFICATE----- MIID0zCCArugAwIBAgIQVmcdBOpPmUxvEIFHWdJ1lDANBgkqhkiG9w0BAQwFADB7 MQswCQYDVQQGEwJHQjEbMBkGA1UECAwSR3JlYXRlciBNYW5jaGVzdGVyMRAwDgYD VQQHDAdTYWxmb3JkMRowGAYDVQQKDBFDb21vZG8gQ0EgTGltaXRlZDEhMB8GA1UE AwwYQUFBIENlcnRpZmljYXRlIFNlcnZpY2VzMB4XDTE5MDMxMjAwMDAwMFoXDTI4 MTIzMTIzNTk1OVowgYgxCzAJBgNVBAYTAlVTMRMwEQYDVQQIEwpOZXcgSmVyc2V5 MRQwEgYDVQQHEwtKZXJzZXkgQ2l0eTEeMBwGA1UEChMVVGhlIFVTRVJUUlVTVCBO ZXR3b3JrMS4wLAYDVQQDEyVVU0VSVHJ1c3QgRUNDIENlcnRpZmljYXRpb24gQXV0 aG9yaXR5MHYwEAYHKoZIzj0CAQYFK4EEACIDYgAEGqxUWqn5aCPnetUkb1PGWthL q8bVttHmc3Gu3ZzWDGH926CJA7gFFOxXzu5dP+Ihs8731Ip54KODfi2X0GHE8Znc JZFjq38wo7Rw4sehM5zzvy5cU7Ffs30yf4o043l5o4HyMIHvMB8GA1UdIwQYMBaA FKARCiM+lvEH7OKvKe+CpX/QMKS0MB0GA1UdDgQWBBQ64QmG1M8ZwpZ2dEl23OA1 xmNjmjAOBgNVHQ8BAf8EBAMCAYYwDwYDVR0TAQH/BAUwAwEB/zARBgNVHSAECjAI MAYGBFUdIAAwQwYDVR0fBDwwOjA4oDagNIYyaHR0cDovL2NybC5jb21vZG9jYS5j b20vQUFBQ2VydGlmaWNhdGVTZXJ2aWNlcy5jcmwwNAYIKwYBBQUHAQEEKDAmMCQG CCsGAQUFBzABhhhodHRwOi8vb2NzcC5jb21vZG9jYS5jb20wDQYJKoZIhvcNAQEM BQADggEBABns652JLCALBIAdGN5CmXKZFjK9Dpx1WywV4ilAbe7/ctvbq5AfjJXy ij0IckKJUAfiORVsAYfZFhr1wHUrxeZWEQff2Ji8fJ8ZOd+LygBkc7xGEJuTI42+ FsMuCIKchjN0djsoTI0DQoWz4rIjQtUfenVqGtF8qmchxDM6OW1TyaLtYiKou+JV bJlsQ2uRl9EMC5MCHdK8aXdJ5htN978UeAOwproLtOGFfy/cQjutdAFI3tZs4RmY CV4Ks2dH/hzg1cEo70qLRDEmBDeNiXQ2Lu+lIg+DdEmSx/cQwgwp+7e9un/jX9Wf 8qn0dNW44bOwgeThpWOjzOoEeJBuv/c= -----END CERTIFICATE-----'
    
    
    ##########################################################
    ## OTA Firmware                                         ##
    ##########################################################
    
    otaConfiguration:
      type: object
      properties:
        url:
          type: string
          format: url
          description: URL for the firmware update server
          minLength: 1
          maxLength: 128
          examples:
            - http://www.somewhere.com/firmware.json
      required:
        - url

    firmwareVersion:
      type: object
      description: A firmware version object containing the partitions to flash.
      properties:
        application_name:
          type: string
          description: Human-readable application name
          example: "FireFly Controller"
        version:
          type: string
          description: Firmware version string
          example: "2026.03.01"
        binaries:
          type: array
          description: Partition binaries to flash. Any combination of app and ui is accepted.
          items:
            type: object
            properties:
              partition:
                type: string
                enum: [app, ui]
                description: Partition label
              url:
                type: string
                description: URL to the partition binary (.bin)
                example: "https://firmware.fireflylx.com/controller/0x32322505/2026.03.01/Controller.ino.bin"
              sha256:
                type: string
                description: SHA-256 hex digest of the binary; if present, the digest is verified before the partition is activated. Absent means verification is skipped.
                example: "a3f1c2d4e5b6a7f8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
        release_url:
          type: string
          description: URL to the release announcement. Omitted if not provided.
          example: "https://github.com/BrentIO/FireFly-Controller/releases/tag/2026.03.01"


    ##########################################################
    ## Controller                                           ##
    ##########################################################

    controller:
      type: object
      properties:
        name:
          type: string
          description: Human-friendly name of the controller
          examples:
            - First floor
          maxLength: 20 #Maximum length relates to hardware.h -> CONTROLLER_NAME_MAX_LENGTH
        area:
          type: string
          description: Area where the controller is located
          examples:
            - Tech Room
          maxLength: 20 #Maximum length relates to hardware.h -> CONTROLLER_AREA_MAX_LENGTH
        mac_address:
          $ref: '#/components/schemas/macAddress'
        ports:
          $ref: '#/components/schemas/inputPort'
        outputs:
          $ref: '#/components/schemas/outputPort'
        ota:
          $ref: '#/components/schemas/otaConfiguration'
        mqtt:
          $ref: '#/components/schemas/mqtt'
      required:
        - name
        - mac_address

    inputPort:
      type: object
      propertyNames:
          pattern: ^[1-9][0-9]*$
      additionalProperties:
        type: object
        properties:
          name:
            type: string
            description: Human-friendly name
            maxLength: 20
          id:
            type: string
            description: A short ID for the input, used for addressing the device over MQTT.  When an input spans multiple input ports (such as a switch with 6 buttons), the same ID should be used across both input ports
            maxLength: 8 #Maximum length relates to hardware.h -> PORT_ID_MAX_LENGTH
            minLength: 1
            pattern: ^[A-Za-z0-9~!@#$%^&*()_\+-=|]{1,8}$
            examples:
              - S16
          offset:
            type: number
            description: Offset to add to the channel number, used when an input spans multiple ports (such as a switch witih 6 buttons)
            default: 0
          channels:
            type: object
            propertyNames: 
              pattern: ^[1-3,6]$
            additionalProperties:
              $ref: '#/components/schemas/channel'
        required:
          - id
      examples:
        - 1:
           id: S22
           channels:
            1:
              actions:
                - type: INCREASE_MAXIMUM
                  change_state: LONG
                  output: 4
                - type: INCREASE
                  output: 4
            2:
              actions:
              - type: DECREASE
                change_state: SHORT
                output: 4
            3:
              actions:
              - type: TOGGLE
                change_state: SHORT
                output: 6
            4:
              actions:
              - type: DECREASE
                change_state: SHORT
                output: 4
          2:
           id: S22
           channels:
            1:
              offset: 4
              actions:
                - type: INCREASE_MAXIMUM
                  change_state: LONG
                  output: 9
                - type: INCREASE
                  output: 9
            2:
              offset: 4
              actions:
              - type: DECREASE
                change_state: SHORT
                output: 11
          3:
           id: S17
           channels:
            1:
              actions:
                - type: TOGGLE
                  output: 6


    channel:
      type: object
      properties:
        type:
          type: string
          description: Defines if the channel is normally open or normally closed
          default: NORMALLY_OPEN
          enum:
            - NORMALLY_OPEN
            - NORMALLY_CLOSED
        enabled:
          type: boolean
          description: Indicates if the channel is enabled
          default: true
        actions:
            type: array
            items:
                $ref: '#/components/schemas/action'

    outputPort:
      type: object
      propertyNames:
          pattern: ^[1-9][0-9]*$
      additionalProperties:
        type: object
        properties:
          name:
            type: string
            description: Human-friendly name
            maxLength: 20   #Maximum length relates to hardware.h -> OUTPUT_ID_MAX_LENGTH
          id:
            type: string
            description: A unique short ID for the output, used for addressing the device over MQTT
            maxLength: 8    #Maximum length relates to hardware.h -> OUTPUT_ID_MAX_LENGTH
            minLength: 1
            pattern: ^[A-Za-z0-9~!@#$%^&*()_\+-=|]{1,8}$
            examples:
              - C7
          area:
            type: string
            description: Area where the output fixture is located
            maxLength: 20
          icon:
            type: string
            description: Reference to an MDI icon
            maxLength: 64
          type:
            type: string
            description: Defines if the fixture has a binary or variable output
            enum:
              - BINARY
              - VARIABLE
            default: BINARY
          start_brightness:
            type: integer
            description: Brightness level (5–100) applied when an INCREASE button action turns this output on from off. Only meaningful for VARIABLE outputs. Omit to use the default (10). Values below 5 are rejected by the firmware minimum brightness threshold.
            minimum: 5
            maximum: 100
            default: 10
          enabled:
            type: boolean
            description: Indicates if the output is enabled
            default: true
        required:
          - id
      examples:
        - 4:
            id: C49
            name: Chandelier
            area: Foyer
            icon: mdi:chandelier
            type: VARIABLE
          12:
            id: C12
            name: Recessed Lights
            area: Bathroom
            icon: mdi:light-recessed
          13:
            id: C7
            enabled: false

    action:
        type: object
        properties:
          change_state:
            type: string
            description: The action will be taken when the change state is observed
            default: SHORT
            enum:
              - SHORT
              - LONG
          action:
            type: string
            description: Action to take
            enum:
              - INCREASE
              - INCREASE_MAXIMUM
              - DECREASE
              - DECREASE_MAXIMUM
              - TOGGLE
          output:
            type: number
            format: integer
            description: The output number the requested action will be applied to
            pattern: ^[1-9][0-9]*$
        required:
          - action
          - output


    ##########################################################
    ## Client                                           ##
    ##########################################################

    client:
      type: object
      properties:
        id:
          type: string
          description: Short port identifier used as basis for MQTT topic paths
          maxLength: 8 #Maximum length relates to hardware.h -> PORT_ID_MAX_LENGTH
          minLength: 1
          pattern: ^[A-Za-z0-9~!@#$%^&*()_\+-=|]{1,8}$
          examples:
            - S22
        name:
          type: string
          description: Human-friendly name of the client
          examples:
            - First floor
          maxLength: 20 #Maximum length relates to hardware.h -> CLIENT_NAME_MAX_LENGTH
        mac_address:
          $ref: '#/components/schemas/macAddress'
        area:
          type: string
          description: Area where the client is located
          examples:
            - Tech Room
          maxLength: 20 #Maximum length relates to hardware.h -> CLIENT_AREA_MAX_LENGTH
        hids:
          $ref: '#/components/schemas/hid'
        ota:
          $ref: '#/components/schemas/otaConfiguration'
        mqtt:
          $ref: '#/components/schemas/mqtt'
        wifi:
          $ref: '#/components/schemas/wifi'
      required:
        - id
        - name

    hid:
      type: object
      description: Human Interface Device
      propertyNames:
        pattern: ^[0-5]$
      additionalProperties:
        type: object
        properties:
          color:
            $ref: '#/components/schemas/colorName'
          tags:
            type: array
            items:
              $ref: '#/components/schemas/tag'
          defaultBrightness:
            type: integer
            description: Default LED brightness percentage; omitted when using firmware default (100%)
            minimum: 1
            maximum: 100
            examples:
              - 75
      examples:
        - 1:
            color: Blue
            tags:
              - Holiday
          2:
            color: Yellow
            tags:
              - Security
              - Holiday
          4:
            color: Yellow

    wifi:
      type: object
      description: WiFi configuration settings
      properties:
        ssid:
          type: string
          description: Network SSID to connect
          minLength: 1
          maxLength: 32
          examples:
            - MyWiFiNet
        password:
          type: string
          description: Pre-shared WiFi password/key
          minLength: 8
          maxLength: 63
          examples:
            - aVery$3cretPassw0r[)

    macAddress:
      type: string
      description: Hardware MAC address
      pattern: ^(?:[0-9a-f]{2}[:]){5}(?:[0-9a-f]{2})$


    ##########################################################
    ## General                                              ##
    ##########################################################

    fileList:
      type: object
      propertyNames:
        type: string
        enum: [config, ui]
      additionalProperties:
        type: object
        properties:
          total:
            type: number
            format: integer
            description: Total number of bytes on the file system
          used:
            type: number
            format: integer
            description: Used number of bytes on the file system
          files:
            type: array
            items:
              type: object
              properties:
                path:
                  type: string
                  description: Fully-qualified path and filename of the file
                size:
                  type: number
                  format: integer
                  description: Used number of bytes consumed by the file
          error:
            type: string
            description: Is sent if an error if there is one for the file system
      examples:
        - config:
            total: 524288
            used: 69632
            files:
              - path: /devices/controllers/3fa85f64-5717-4562-b3fc-2c963f66afa6
                size: 912
          ui:
            error: File system not mounted

    dexieFormat:
      type: object

    uuid:
      type: string
      description: Unique identifier
      format: uuid
      minLength: 36
      maxLength: 36

    mqtt:
      type: object
      description: MQTT configuration settings
      properties:
        host:
          type: string
          description: The hostname for the MQTT server
          minLength: 1
          maxLength: 64
          examples:
            - mymqtt.host.com
        port:
          type: integer
          description: The port number for the MQTT server
          default: 1883
          minimum: 1
          maximum: 65535
          examples:
            - 1883
        username:
          type: string
          description: Authentication username
          minLength: 1
          maxLength: 64
          examples:
            - controller1
        password:
          type: string
          description: Authentication password
          minLength: 1
          maxLength: 64
          examples:
            - aVery$3cretPassw0r[)

    tag:
      type: string
      description: An arbitrary piece of associated data
      minLength: 1
      maxLength: 20
      examples:
        - Security
        - Holiday

    colorName:
      type: string
      description: Human-friendly name of a color
      minLength: 1
      maxLength: 20
      examples:
        - Blue
        - Red


##########################################################
##########################################################
## Examples                                             ##
##########################################################
##########################################################

  examples:
    emptyArray:
      value: []

    eventLog:
      value:
        - time: 1709398094
          level: info
          text: Event log started
        - time: 1709398150
          level: notify
          text: MQTT connected
        - time: 1709398228
          level: error
          text: MQTT disconnected
    
    errorLog:
      value:
        - text: MQTT disconnected
        - text: Ethernet disconnected
   
    ota_http:
      value:
        url: http://www.somewhere.com/firmware.json
    
    ota_https:
      value:
        url: https://www.somewhere.com/firmware.json