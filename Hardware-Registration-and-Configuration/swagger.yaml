openapi: 3.0.3
info:
  title: FireFly Hardware Registration and Configuration
  description: Retrieve and set data required for hardware registration
  version: ""
servers:
  - url: http://{domain}
    variables:
      domain:
        default: 192.168.4.1
        description: IP address of the device's ethernet interface
tags:
  - name: Authorization
    description: Mangage long-term http authorizations
  - name: Device Identity
    description: Operations for managing the device identity data
  - name: Event and Error Logs
    description: Operations for the event and error logs
  - name: Network
    description: Operations for network communications
  - name: Partitions
    description: Operations for the internal partition information
  - name: Peripherals
    description: Operations for the on-board peripherals
  - name: MCU
    description: Operations for the main control unit
  - name: Version
    description: Operations for the hardware and firmware versions
paths:
  /api/network:
    get:
      tags:
        - Network
      summary: Retrieve all network interfaces
      description: Retrieve all of the network interfaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listmacAddressAndType'
  /api/network/{interface}:
    get:
      tags:
        - Network
      summary: Retrieve the specified network interface
      description: Retrieve the specified network interface information
      parameters:
        - in: path
          name: interface
          schema:
            $ref: '#/components/schemas/networkInterfaceTypes'
          required: true
          description: Network interface to retrieve
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/macAddressAndType'
        '404':
          description: Not Found
  /api/identity:
    post:
      tags:
        - Device Identity
      summary: Store the device identity
      description: Store the device identity with the payload specified.  The response is synchronous to the operation completing
      security:
        - visualToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/identityConfig'
      responses:
        '201':
          description: Wrote device identity successfully
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bad_request_message'
              example:
                message: Device identity already configured
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: NVS write failure
    get:
      tags:
        - Device Identity
      summary: Retrieve the device identity
      description: Retrieve the current device identity
      security:
        - visualToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/identityConfig'
        '401':
          description: Unauthorized
        '404':
          description: No device identity configured
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: NVS read failure
    delete:
      tags:
        - Device Identity
      summary: Delete the device identity
      description: Delete the device identity from NVS.  The response is synchronous to the operation completing
      security:
        - visualToken: []
      responses:
        '204':
          description: Deleted device identity successfully
        '401':
          description: Unauthorized
        '404':
          description: No device identity configured
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: NVS delete failure
  /api/mcu:
    get:
      tags:
        - MCU
      summary: Main control unit hardware information
      description: Retrieve the main control unit hardware information
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mcuInfo'
  /api/mcu/reboot:
    post:
      tags:
        - MCU
      summary: Reboot the main control unit
      description: Performs a reboot on the main control unit
      security:
        - visualToken: []
      responses:
        '204':
          description: Accepted
        '401':
          description: Unauthorized  
  /api/partitions:
    get:
      tags:
        - Partitions
      summary: Internal partition schema
      description: Retrieve internal partition schema information from the MCU
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listPartitions'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error_message'
              example:
                message: esp_partition_find returned NULL
  /api/peripherals:
    get:
      tags:
        - Peripherals
      summary: On-board peripheral information
      description: Retrieve all peripherals that were defined for the hardware type in firmware
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listPeripherals'
  /api/version:
    get:
      tags:
        - Version
      summary: Hardware and firmware version information
      description: Retrieves the hardware and firmware version information
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/applicationVersionInfo'
  /api/errors:
    get:
      tags:
        - Event and Error Logs
      summary: Error log information
      description: Retrieve all of the active errors
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorLog'
              examples:
                Events in the log:
                  $ref: '#/components/examples/errorLog'
                No log entries:
                  $ref: '#/components/examples/emptyArray'
  /api/events:
    get:
      tags:
        - Event and Error Logs
      summary: Event log information
      description: Retrieve all of the events still remaining in the event log
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/eventLog'
              examples:
                Events in the log:
                  $ref: '#/components/examples/eventLog'
                No log entries:
                  $ref: '#/components/examples/emptyArray'
  /auth:
    post:
      tags:
        - Authorization
      summary: Authorize the visual token
      description: Creates a long-term authorization for a visual token (typically 60 minutes)
      security:
        - visualToken: []
      responses:
        '204':
          description: Authorized
        '401':
          description: Unauthorized
components:
  securitySchemes:
    visualToken:
      type: apiKey
      in: header
      name: visual-token
      description: A security token visually displayed on the device which changes on a regular basis
  schemas:
    error_message:
      type: object
      properties:
        message:
          type: string
          description: Message describing the error condition
          example: Unexpected Error
    bad_request_message:
      type: object
      properties:
        message:
          type: string
          description: Message describing the issue with the request body
          example: Missing parameter in request
    networkInterfaceTypes:
      type: string
      enum:
        - bluetooth
        - ethernet
        - wifi
        - wifi_ap
    macAddress:
      type: string
      description: Hardware address
      pattern: ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$
      example: DE:AD:BE:EF:FE:ED
    listmacAddressAndType:
      type: array
      items:
        $ref: '#/components/schemas/macAddressAndType'
    macAddressAndType:
      type: object
      properties:
        mac_address:
          $ref: '#/components/schemas/macAddress'
        interface:
          $ref: '#/components/schemas/networkInterfaceTypes'
    partitionType:
      type: integer
      description: Partition Type, as defined in https://docs.espressif.com/projects/esp-idf/en/v4.2/esp32/api-reference/storage/spi_flash.html#_CPPv420esp_partition_type_t
      example: 1
    partitionSubType:
      type: integer
      description: Partition SubType, as defined in https://docs.espressif.com/projects/esp-idf/en/v4.2/esp32/api-reference/storage/spi_flash.html#_CPPv423esp_partition_subtype_t
      example: 2
    partitionAddress:
      type: integer
      description: Start address for the partition, in bytes
      example: 36864
    partitionSize:
      type: integer
      description: Size of the partition, in bytes
      example: 20480
    partitionLabel:
      type: string
      maxLength: 16
      description: Arbitrary label for the partition
      example: nvs
    partition:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/partitionType'
        subtype:
          $ref: '#/components/schemas/partitionSubType'
        address:
          $ref: '#/components/schemas/partitionAddress'
        size:
          $ref: '#/components/schemas/partitionSize'
        label:
          $ref: '#/components/schemas/partitionLabel'
    listPartitions:
      type: array
      items:
        $ref: '#/components/schemas/partition'
    peripheralAddress:
      type: string
      maxLength: 5
      pattern: ^[A-Fa-f0-9]+$
      description: Hexadecimal address of the peripheral
      example: '0x20'
    peripheralType:
      type: string
      description: Type of peripheral
      enum:
        - INPUT
        - OUTPUT
        - TEMPERATURE
        - OLED
        - NVS
    peripheralOnline:
      type: boolean
      description: If the peripheral was found to be online
    peripheral:
      type: object
      properties:
        address:
          $ref: '#/components/schemas/peripheralAddress'
        type:
          $ref: '#/components/schemas/peripheralType'
        online:
          $ref: '#/components/schemas/peripheralOnline'
    listPeripherals:
      type: array
      items:
        $ref: '#/components/schemas/peripheral'
    identityConfig:
      type: object
      properties:
        uuid:
          type: string
          description: Unique identifier for the device
          format: uuid
          minLength: 36
          maxLength: 36
        product_id:
          type: string
          description: Device product ID, which includes the board revision code
          example: FFC3232-2211
          maxLength: 32
        product_hex:
          type: string
          description: Device product hexadecimal identifier
          example: '0x32322304'
          pattern: '^0x[0-9A-Fa-f]{8}$'
        key:
          type: string
          description: String of random characters used for authentication
          minLength: 64
          maxLength: 64
          example: bCsCaNv1LIf0UriPsKWTOTbz2biycaNOL57fcuBjqkxrnSONcqjHt1416iJfg8QJ
          pattern: ^[0-9A-Za-z]{64}$
      required:
        - uuid
        - product_id
        - product_hex
        - key
    mcuInfo:
      type: object
      properties:
        chip_model:
          type: string
          description: Main chip model
          example: ESP32-D0WDQ5
        revision:
          type: string
          description: Chip revision
          example: 3
        flash_chip_size:
          type: integer
          description: Size of the flash chip in bytes
          example: 16777216
        boot_time:
          type: integer
          description: Epoch time the device booted in seconds.  If unknown, number of seconds elapsed since boot will be returned
          example: 1709398094
        psram_size:
          type: integer
          description: Total size of PSRAM in bytes. 0 if no PSRAM is detected
          example: 8388608
    eventLog:
      type: array
      items:
        $ref: '#/components/schemas/eventLogEntry'
    eventLogEntry:
      type: object
      properties:
        time:
          type: integer
          description: Time the event occurred, in seconds.  If NTP time was available when the event was logged, Epoch time will be used.  Otherwise, time since boot will be used
          example: 1709398094
        level:
          type: string
          description: Severity level for the event
          enum:
            - info
            - notify
            - error
            - unknown
          example: info
        text:
          type: string
          description: Descriptive text about the event
          example: Event log started
    errorLog:
      type: array
      items:
        $ref: '#/components/schemas/errorLogEntry'
    errorLogEntry:
      type: object
      properties:
        text:
          type: string
          description: Descriptive text about the event
          example: No I/O ConfigFS offline
    applicationVersion:
      type: string
      description: Software version
      example: '2024.2.1'
    productHex:
      type: string
      description: Hardware product hexadecimal, indicating the version of the firmware
      example: '0x8062305'
    applicationVersionInfo:
      type: object
      properties:
        application:
          $ref: '#/components/schemas/applicationVersion'
        product_hex:
          $ref: '#/components/schemas/productHex'
  examples:
    emptyArray:
      value: []
    eventLog:
      value:
        - time: 1709398094
          level: info
          text: Event log started
        - time: 1709398150
          level: notify
          text: MQTT connected
        - time: 1709398228
          level: error
          text: MQTT disconnected
    errorLog:
      value:
        - text: MQTT disconnected
        - text: Ethernet disconnected