# Arduino cores and libraries used by FireFly Controller firmware.
# This is the single source of truth for core/library names, versions, and URLs.
# `sha` is the full commit SHA the pinned `version` tag points to, used for the actual
# git-ref install so a moved/re-pointed tag can't silently change what gets built.
# Changes here are automatically propagated to FireFly-Docs on production builds.
# URL must not include a .git suffix.

