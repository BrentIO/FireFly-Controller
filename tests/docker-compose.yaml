services:
  controller:
    build: .
    stdin_open: true
    tty: true
    environment:
      - DEVICE_IP=${DEVICE_IP}
      - VISUAL_TOKEN=${VISUAL_TOKEN:-}
      - NO_AUTH=${NO_AUTH:-false}
    volumes:
      - ./results:/tests/results
    command: pytest controller/ -v --html=results/controller-report.html --self-contained-html

  hw-reg:
    build: .
    stdin_open: true
    tty: true
    environment:
      - DEVICE_IP=${DEVICE_IP}
      - VISUAL_TOKEN=${VISUAL_TOKEN:-}
      - NO_AUTH=${NO_AUTH:-false}
    volumes:
      - ./results:/tests/results
    command: pytest hw-reg/ -v --html=results/hw-reg-report.html --self-contained-html
