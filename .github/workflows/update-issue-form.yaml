name: Update issue form hardware variants

on:
  push:
    branches: [main]
    paths:
      - devices.yaml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update hardware variants in bug report form
        run: node scripts/update-issue-form.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .github/ISSUE_TEMPLATE/bug_report.yml; then
            echo "No changes to bug_report.yml"
          else
            git add .github/ISSUE_TEMPLATE/bug_report.yml
            git commit -m "Update hardware variants in bug report form [skip ci]"
            git push
          fi
