name: 🔧 Compile Check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: compile-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    name: Compile Firmware
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read build variables
        run: |
          echo "VERSION_ESP_Core=$(yq -r '.cores[] | select(.name == "esp32:esp32") | .version' libraries.yaml)" >> $GITHUB_ENV
          FIRST_DEVICE=$(yq -o=json '.devices[] | select(.status == "ACTIVE")' devices.yaml | jq -rs '.[0]')
          echo "PRODUCT_HEX=$(echo "$FIRST_DEVICE" | jq -r '.product_hex')" >> $GITHUB_ENV
          echo "BOOTLOADER_ADDR=$(echo "$FIRST_DEVICE" | jq -r '.bootloader_addr')" >> $GITHUB_ENV
          echo "PARTITION_SIZE_APP=$(echo "$FIRST_DEVICE" | jq -r '.partition_scheme[] | select(.label == "app0") | .size')" >> $GITHUB_ENV
          echo "BURN_VDD_SDIO_EFUSE=$(echo "$FIRST_DEVICE" | jq -r '.burn_vdd_sdio_efuse // false')" >> $GITHUB_ENV

      - name: Generate boards.local.txt
        run: |
          APP_SIZE_DEC=$(( ${{ env.PARTITION_SIZE_APP }} ))
          sed \
            -e "s|{{BOOTLOADER_ADDR}}|${{ env.BOOTLOADER_ADDR }}|g" \
            -e "s|{{APP_PARTITION_MAX_SIZE}}|${APP_SIZE_DEC}|g" \
            -e "s|{{FLASH_MODE}}|dio|g" \
            -e "s|{{BOOT_MODE}}|qio|g" \
            -e "s|{{FLASH_FREQ}}|80m|g" \
            boards.local.txt.template \
            > boards.local.txt

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: 1.4.1

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index

      - name: Install ESP32 core
        run: arduino-cli core install esp32:esp32@${{ env.VERSION_ESP_Core }}

      - name: Create symlink for boards.local.txt
        run: |
          ARDUINO_DIR=$(arduino-cli config get directories.data)
          ln -s ${{ github.workspace }}/boards.local.txt ${ARDUINO_DIR}/packages/esp32/hardware/esp32/${{ env.VERSION_ESP_Core }}/boards.local.txt

      - name: Enable unsafe library install
        run: arduino-cli config set library.enable_unsafe_install true

      - name: Install libraries
        run: |
          yq -r '.libraries[] | .url + ".git#" + .version' libraries.yaml | \
            xargs -I{} arduino-cli lib install --git-url {}

      - name: Compile Controller
        run: |
          PSRAM_FLAGS="-DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue -mfix-esp32-psram-cache-strategy=memw"
          arduino-cli compile \
            -b esp32:esp32:firefly_controller ./Controller \
            --warnings more --clean \
            --build-property "build.extra_flags=-DASYNCWEBSERVER_REGEX -DPRODUCT_HEX=${{ env.PRODUCT_HEX }} -DESP32 -DDISABLE_ALL_LIBRARY_WARNINGS -DCORE_DEBUG_LEVEL=4 -DFIREFLY_CLOUD_API_ROOT=\"https://api.fireflylx.com\" -I${{ github.workspace }} ${PSRAM_FLAGS}"

      - name: Compile Hardware-Registration-and-Configuration
        run: |
          PSRAM_FLAGS="-DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue -mfix-esp32-psram-cache-strategy=memw"
          EFUSE_FLAG=""
          if [ "${{ env.BURN_VDD_SDIO_EFUSE }}" = "true" ]; then
            EFUSE_FLAG=" -DBURN_VDD_SDIO_EFUSE=1"
          fi
          arduino-cli compile \
            -b esp32:esp32:firefly_controller ./Hardware-Registration-and-Configuration \
            --warnings more --clean \
            --build-property "build.extra_flags=-DASYNCWEBSERVER_REGEX -DPRODUCT_HEX=${{ env.PRODUCT_HEX }} -DESP32 -DDISABLE_ALL_LIBRARY_WARNINGS -DCORE_DEBUG_LEVEL=4${EFUSE_FLAG} -DFIREFLY_CLOUD_API_ROOT=\"https://api.fireflylx.com\" -I${{ github.workspace }} ${PSRAM_FLAGS}"
