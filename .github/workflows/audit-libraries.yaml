name: 🔍 Audit Library Versions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC

jobs:
  audit:
    name: Check for Library Updates
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Audit Arduino Library Versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Library list extracted from libraries.yaml
          # Format: "owner/repo pinned_version"
          declare -A LIBS
          LIBS["adafruit/Adafruit_BusIO"]="1.17.4"
          LIBS["adafruit/Adafruit-GFX-Library"]="1.12.5"
          LIBS["adafruit/Adafruit_SSD1306"]="2.5.16"
          LIBS["bblanchon/ArduinoJson"]="v7.4.1"
          LIBS["bblanchon/ArduinoStreamUtils"]="v1.9.2"
          LIBS["ESP32Async/AsyncTCP"]="v3.4.9"
          LIBS["arduino-libraries/Ethernet"]="2.0.2"
          LIBS["ESP32Async/ESPAsyncWebServer"]="v3.9.6"
          LIBS["BrentIO/esp32FOTA"]="2026.4.1"
          LIBS["BrentIO/PCA95x5"]="2023.10.2"
          LIBS["BrentIO/PCT2075"]="2023.10.3"
          LIBS["ivanseidel/LinkedList"]="v1.3.3"
          LIBS["arduino-libraries/NTPClient"]="3.2.1"
          LIBS["RobTillaart/PCA9685_RT"]="0.7.3"
          LIBS["nickgammon/Regexp"]="0.1.1"
          LIBS["thingsboard/pubsubclient"]="v2.12.1"

          # Order to match libraries.yaml for consistent output
          ORDERED_KEYS=(
            "adafruit/Adafruit_BusIO"
            "adafruit/Adafruit-GFX-Library"
            "adafruit/Adafruit_SSD1306"
            "bblanchon/ArduinoJson"
            "bblanchon/ArduinoStreamUtils"
            "ESP32Async/AsyncTCP"
            "arduino-libraries/Ethernet"
            "ESP32Async/ESPAsyncWebServer"
            "BrentIO/esp32FOTA"
            "BrentIO/PCA95x5"
            "BrentIO/PCT2075"
            "ivanseidel/LinkedList"
            "arduino-libraries/NTPClient"
            "RobTillaart/PCA9685_RT"
            "nickgammon/Regexp"
            "thingsboard/pubsubclient"
          )

          get_latest_version() {
            local repo="$1"
            local http_code
            local body

            # Try /releases/latest first
            response=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}/releases/latest")

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n -1)

            if [ "$http_code" = "200" ]; then
              echo "$body" | grep -m1 '"tag_name"' | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/'
              return
            fi

            # Fall back to /tags
            response=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}/tags?per_page=1")

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n -1)

            if [ "$http_code" = "200" ]; then
              tag=$(echo "$body" | grep -m1 '"name"' | sed 's/.*"name": *"\([^"]*\)".*/\1/')
              if [ -n "$tag" ]; then
                echo "$tag"
                return
              fi
            fi

            echo "unknown"
          }

          {
            echo "## Arduino Library Version Audit"
            echo ""
            echo "| Library | Pinned Version | Latest Version | Status |"
            echo "| ------- | -------------- | -------------- | ------ |"

            outdated_count=0

            for repo in "${ORDERED_KEYS[@]}"; do
              pinned="${LIBS[$repo]}"
              latest=$(get_latest_version "$repo")

              # Normalize versions for comparison (strip leading 'v')
              pinned_norm="${pinned#v}"
              latest_norm="${latest#v}"

              if [ "$latest" = "unknown" ]; then
                status="⚠️ unknown"
              elif [ "$pinned_norm" = "$latest_norm" ]; then
                status="✅ up to date"
              else
                status="❌ out of date"
                outdated_count=$((outdated_count + 1))
              fi

              echo "| [\`${repo}\`](https://github.com/${repo}) | \`${pinned}\` | \`${latest}\` | ${status} |"
            done

            echo ""
            if [ "$outdated_count" -eq 0 ]; then
              echo "All libraries are up to date."
            else
              echo "${outdated_count} library/libraries may need updating. Review the table above."
            fi

          } >> "$GITHUB_STEP_SUMMARY"
