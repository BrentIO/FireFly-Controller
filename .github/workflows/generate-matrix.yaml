name: 📋 Generate Firmware and Device Matrix

on:
  workflow_call:
    outputs:
      matrix:
        description: "Generated build matrix"
        value: ${{ jobs.generate.outputs.matrix }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - id: build
        run: |
          MATRIX=$(yq -o=json devices.yaml | jq -c '
            {
              include: [
                ["Controller", "Hardware-Registration-and-Configuration"][] as $app |
                .devices[]
                | select(.status == "ACTIVE")
                | {
                    application: $app,
                    product_hex: .product_hex,
                    product_id: .product_id,
                    bootloader_addr: .bootloader_addr,
                    burn_vdd_sdio_efuse: (.burn_vdd_sdio_efuse // false),
                    partition_size_app: (
                      .partition_scheme[]
                      | select(.label == "app0")
                      | .size
                    ),
                    partition_size_config: (
                      .partition_scheme[]
                      | select(.label == "config")
                      | .size
                    ),
                    partition_size_www: (
                      .partition_scheme[]
                      | select(.label == "www")
                      | .size
                    )
                  }
              ]
            }
          ')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT