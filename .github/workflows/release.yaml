name: 🚀 Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (YYYY.MM.bb)'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]{4}\.(0[1-9]|1[0-2])\.(0[1-9]|[1-9][0-9])$ ]]; then
            echo "❌ Invalid version format: ${{ inputs.version }}. Expected YYYY.MM.bb"
            exit 1
          fi
          echo "✅ Version format is valid: ${{ inputs.version }}"

      - name: Tag and push
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true

      - name: Build firmware for production
        run: gh workflow run build-firmware.yaml --ref ${{ inputs.version }} -f target_env=production
        env:
          GH_TOKEN: ${{ github.token }}
